# A small config used to show off a custom theme (see OceanTheme.php).
# Lowest friction: name the theme class directly - no registration needed.
title: 'Ocean theme demo'
theme: '\Playground\CustomTheme\OceanTheme'

panels:
  - id: profile
    title: 'Diver profile'
    fields:
      - id: name
        label: 'Name'
        type: text
        default: Explorer
      - id: depth
        label: 'Preferred depth'
        type: select
        default: reef
        options:
          - { value: surface, label: 'Surface' }
          - { value: reef, label: 'Reef' }
          - { value: abyss, label: 'Abyss' }
      - id: gear
        label: 'Gear'
        type: multiselect
        options:
          - { value: mask, label: 'Mask' }
          - { value: fins, label: 'Fins' }
          - { value: tank, label: 'Tank' }
