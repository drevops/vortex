# GitHub Actions configuration file.
#
# This configuration file uses a custom "container" executor to run the
# Docker stack to speed up the build process.
name: Database, Build, Test and Deploy

on:
  push:
    # Pushes to the following branches will trigger the workflow.
    branches:
      - production
      - main
      - master
      - develop
      - release/**
      - hotfix/**
      - project/**
    # Pushes of tags will also trigger the workflow.
    tags:
      - '*'
  # Pull requests to the following branches will trigger the workflow.
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - production
      - main
      - master
      - develop
      - release/**
      - hotfix/**
      - feature/**
      - bugfix/**
      - project/**

  workflow_dispatch:
    inputs:
      deploy_target:
        type: string
        description: 'Deploy target: "<branch>" or "PR-<num>"'
        required: false
        default: ''
      override_db:
        type: boolean
        description: 'Override existing database'
        required: false
        default: false
      enable_terminal:
        type: boolean
        description: 'Enable terminal session for CI jobs'
        required: false
        default: false

defaults:
  run:
    shell: bash

# Workaround for the Actions runner creating /root/.docker/config.json
# with permissions that prevent the container from reading it.
# https://github.com/actions/runner/issues/863
env:
  DOCKER_CONFIG: /tmp/.docker

permissions:
  contents: read # Minimal default for all jobs; jobs that need more override below.

jobs:

  lint:
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_target && (github.event_name == 'push' || !startsWith(github.head_ref, 'project/')) }}

    container:
      # https://hub.docker.com/r/drevops/ci-runner
      image: drevops/ci-runner:__VERSION__
      env:
        PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        VORTEX_CONTAINER_REGISTRY_USER: ${{ secrets.VORTEX_CONTAINER_REGISTRY_USER }}
        VORTEX_CONTAINER_REGISTRY_PASS: ${{ secrets.VORTEX_CONTAINER_REGISTRY_PASS }}
        TZ: ${{ vars.TZ || 'UTC' }}
        TERM: xterm-256color
        VORTEX_DEBUG: ${{ vars.VORTEX_DEBUG }}

    steps:
      - name: Preserve $HOME set in the container
        run: echo HOME=/root >> "$GITHUB_ENV" # https://github.com/actions/runner/issues/863

      - name: Check out code
        uses: actions/checkout@__HASH__ # __VERSION__
        with:
          persist-credentials: false

      - name: Fix Git ownership permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Process the codebase to run in CI
        run: find . -name "docker-compose.yml" -print0 | xargs -0 -I {} sh -c "sed -i -e '/###/d' {} && sed -i -e 's/##//' {}"

      - name: Load environment variables from .env
        run: t=$(mktemp) && export -p >"${t}" && set -a && . ./.env && set +a && . "${t}" && env >> "$GITHUB_ENV"

      - name: Validate Composer configuration
        run: composer validate --strict
        continue-on-error: ${{ vars.VORTEX_CI_COMPOSER_VALIDATE_IGNORE_FAILURE == '1' }}

      - name: Install Vortex tooling
        run: ./scripts/vortex-tooling.sh

      - name: Login to container registry
        run: ./vendor/drevops/vortex-tooling/src/login-container-registry

      - name: Lint Dockerfiles with Hadolint
        run: |
          find .docker \( -name 'Dockerfile' -o -name '*.dockerfile' \) | while read -r file; do
            echo "Linting ${file}" && cat "${file}" | docker run --rm -i hadolint/hadolint
          done
        continue-on-error: ${{ vars.VORTEX_CI_HADOLINT_IGNORE_FAILURE == '1' }}

      - name: Lint Docker Compose files with DCLint
        run: docker run --rm -v "${PWD}":/app zavoloklom/dclint:__VERSION__ .
        continue-on-error: ${{ vars.VORTEX_CI_DCLINT_IGNORE_FAILURE == '1' }}

      - name: Scan for committed secrets with Gitleaks
        run: docker run --rm -v "${PWD}":/repo -w /repo ghcr.io/gitleaks/gitleaks:__VERSION__ dir . --no-banner
        continue-on-error: ${{ vars.VORTEX_CI_GITLEAKS_IGNORE_FAILURE == '1' }}

      - name: Build stack
        run: docker compose up --no-deps --detach cli

      - name: Install development dependencies
        run: |
          docker compose exec $(env | cut -f1 -d= | sed 's/^/-e /') -T cli bash -c " \
            if [ -n \"${PACKAGE_TOKEN:-}\" ]; then export COMPOSER_AUTH='{\"github-oauth\": {\"github.com\": \"${PACKAGE_TOKEN-}\"}}'; fi && \
            COMPOSER_MEMORY_LIMIT=-1 composer --ansi install --prefer-dist"
          docker compose exec $(env | cut -f1 -d= | sed 's/^/-e /') -T cli bash -c "yarn install --frozen-lockfile"

      - name: Audit Composer packages
        run: docker compose exec -T cli composer audit
        continue-on-error: ${{ vars.VORTEX_CI_COMPOSER_AUDIT_IGNORE_FAILURE == '1' }}

      - name: Validate Composer configuration is normalized
        run: docker compose exec -T cli composer normalize --dry-run
        continue-on-error: ${{ vars.VORTEX_CI_COMPOSER_NORMALIZE_IGNORE_FAILURE == '1' }}

      - name: Lint code with PHPCS
        run: docker compose exec -T cli vendor/bin/phpcs
        continue-on-error: ${{ vars.VORTEX_CI_PHPCS_IGNORE_FAILURE == '1' }}

      - name: Lint code with PHPStan
        run: docker compose exec -T cli vendor/bin/phpstan
        continue-on-error: ${{ vars.VORTEX_CI_PHPSTAN_IGNORE_FAILURE == '1' }}

      - name: Lint code with Rector
        run: docker compose exec -T cli vendor/bin/rector --dry-run
        continue-on-error: ${{ vars.VORTEX_CI_RECTOR_IGNORE_FAILURE == '1' }}

      - name: Lint code with Twig CS Fixer
        run: docker compose exec -T cli vendor/bin/twig-cs-fixer
        continue-on-error: ${{ vars.VORTEX_CI_TWIG_CS_FIXER_IGNORE_FAILURE == '1' }}

      - name: Lint code with Gherkin Lint
        run: docker compose exec -T cli vendor/bin/gherkinlint lint tests/behat/features
        continue-on-error: ${{ vars.VORTEX_CI_GHERKIN_LINT_IGNORE_FAILURE == '1' }}

      - name: Lint module code with NodeJS linters
        run: docker compose exec -T cli bash -c "yarn run lint"
        continue-on-error: ${{ vars.VORTEX_CI_NODEJS_LINT_IGNORE_FAILURE == '1' }}

      - name: Lint theme code with NodeJS linters
        if: ${{ vars.VORTEX_FRONTEND_BUILD_SKIP != '1' }}
        run: docker compose exec -T cli bash -c "yarn --cwd=\${WEBROOT}/themes/custom/\${DRUPAL_THEME} run lint"
        continue-on-error: ${{ vars.VORTEX_CI_NODEJS_LINT_IGNORE_FAILURE == '1' }}

  test:
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_target && (github.event_name == 'push' || !startsWith(github.head_ref, 'project/')) }}

    permissions:
      contents: read # Check out the repository.
      checks: write # Publish test results to the Checks tab.
      pull-requests: write # Comment on the pull request.

    strategy:
      # A matrix to run multiple jobs in parallel.
      matrix:
        instance: [0, 1]
      fail-fast: false

    container:
      # https://hub.docker.com/r/drevops/ci-runner
      image: drevops/ci-runner:__VERSION__
      env:
        PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        VORTEX_CONTAINER_REGISTRY_USER: ${{ secrets.VORTEX_CONTAINER_REGISTRY_USER }}
        VORTEX_CONTAINER_REGISTRY_PASS: ${{ secrets.VORTEX_CONTAINER_REGISTRY_PASS }}
        TZ: ${{ vars.TZ || 'UTC' }}
        TERM: xterm-256color
        # Disable strict host key checking for SSH connections.
        VORTEX_SSH_DISABLE_STRICT_HOST_KEY_CHECKING: "1"
        VORTEX_SSH_REMOVE_ALL_KEYS: "1"
        VORTEX_DEBUG: ${{ vars.VORTEX_DEBUG }}
        # How often to refresh the cache of the DB dump. Refer to `date` command.
        VORTEX_CI_DB_CACHE_TIMESTAMP: +%Y%m%d
        # Use previous database caches on this branch as a fallback if the above cache
        # does not match (for example, the cache is available only from the previous
        # day). If "no" is set, the cache will be rebuilt from scratch.
        VORTEX_CI_DB_CACHE_FALLBACK: "yes"
        # Which branch to use as a source of DB caches.
        VORTEX_CI_DB_CACHE_BRANCH: "develop"

    steps:
      - name: Preserve $HOME set in the container
        run: echo HOME=/root >> "$GITHUB_ENV" # https://github.com/actions/runner/issues/863

      - name: Check out code
        uses: actions/checkout@__HASH__ # __VERSION__
        with:
          persist-credentials: false

      - name: Fix Git ownership permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Process the codebase to run in CI
        run: find . -name "docker-compose.yml" -print0 | xargs -0 -I {} sh -c "sed -i -e '/###/d' {} && sed -i -e 's/##//' {}"

      - name: Load environment variables from .env
        run: t=$(mktemp) && export -p >"${t}" && set -a && . ./.env && set +a && . "${t}" && env >> "$GITHUB_ENV"

      - name: Validate Composer configuration
        run: composer validate --strict
        continue-on-error: ${{ vars.VORTEX_CI_COMPOSER_VALIDATE_IGNORE_FAILURE == '1' }}

      - name: Install Vortex tooling
        run: ./scripts/vortex-tooling.sh

      - name: Create cache keys files for database caching
        run: |
          echo "${VORTEX_CI_DB_CACHE_BRANCH}" | tee db_cache_branch
          echo "yes" | tee db_cache_fallback_yes
          date "${VORTEX_CI_DB_CACHE_TIMESTAMP}" | tee db_cache_timestamp

      - name: Show cache key for database caching
        run: echo '__VERSION__${{ hashFiles('db_cache_branch') }}-${{ hashFiles('db_cache_fallback_yes') }}-${{ hashFiles('db_cache_timestamp') }}'

      # Restore DB cache based on the cache strategy set by the cache keys below.
      # Change 'v1' to 'v2', 'v3' etc., commit and push to force cache reset.
      # Lookup cache based on the default branch and a timestamp. Allows
      # to use cache from the very first build on the day (sanitized database dump, for example).
      - name: Restore DB cache
        uses: actions/cache/restore@__HASH__ # __VERSION__
        with:
          path: .data
          # Use cached database from previous builds of this branch.
          key: __VERSION__${{ hashFiles('db_cache_branch') }}-${{ hashFiles('db_cache_fallback_yes') }}-${{ hashFiles('db_cache_timestamp') }}
          restore-keys: |
            __VERSION__${{ hashFiles('db_cache_branch') }}-${{ hashFiles('db_cache_fallback_yes') }}-

      - name: Login to container registry
        run: ./vendor/drevops/vortex-tooling/src/login-container-registry

      - name: Add SSH private key used to download database
        if: ${{ env.VORTEX_DOWNLOAD_DB_SSH_PRIVATE_KEY != '' }}
        uses: shimataro/ssh-key-action@__HASH__ # __VERSION__
        with:
          key: ${{ secrets.VORTEX_DOWNLOAD_DB_SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
        env:
          VORTEX_DOWNLOAD_DB_SSH_PRIVATE_KEY: ${{ secrets.VORTEX_DOWNLOAD_DB_SSH_PRIVATE_KEY }}

      # On the first build of the day (cache miss), download a fresh DB dump.
      # On subsequent builds, the restored cache already contains the dump and
      # the download script skips itself, leaving no semaphore file behind.
      - name: Download DB
        run: |
          VORTEX_DOWNLOAD_DB_SEMAPHORE=/tmp/download-db-success ./vendor/drevops/vortex-tooling/src/download-db
          echo "db_hash=${{ hashFiles('.data') }}" >> "$GITHUB_ENV"
        timeout-minutes: 30

      - name: Build stack
        run: docker compose up --detach && docker builder prune --all --force

      - name: Install development dependencies
        run: |
          docker compose exec $(env | cut -f1 -d= | sed 's/^/-e /') -T cli bash -c " \
            if [ -n \"${PACKAGE_TOKEN:-}\" ]; then export COMPOSER_AUTH='{\"github-oauth\": {\"github.com\": \"${PACKAGE_TOKEN-}\"}}'; fi && \
            COMPOSER_MEMORY_LIMIT=-1 composer --ansi install --prefer-dist"
          docker compose exec $(env | cut -f1 -d= | sed 's/^/-e /') -T cli bash -c "yarn install --frozen-lockfile"

      # Execute commands after the database download finished: if a fresh DB
      # dump was downloaded (cache miss), import it and export it back to
      # produce a clean dump cached for the rest of the day's builds. This also
      # validates the dump and supports "file-to-image" / "image-to-file"
      # conversions. Configuration changes and DB updates are not applied, so
      # the cached database stays in the same state as downloaded. Only the
      # primary parallel runner pushes a refreshed database container image.
      - name: Export DB after download
        run: |
          if [ ! -f /tmp/download-db-success ]; then echo "==> Database download semaphore file is missing. DB export will not proceed."; exit 0; fi
          if [ "${STRATEGY_JOB_TOTAL}" -gt 1 ] && [ "${STRATEGY_JOB_INDEX}" -ne 0 ]; then export VORTEX_EXPORT_DB_CONTAINER_REGISTRY_DEPLOY_PROCEED=0; fi
          docker compose exec cli mkdir -p .data && docker compose cp -L .data/db.sql cli:/app/.data/db.sql || true
          docker compose exec cli bash -c "VORTEX_PROVISION_POST_OPERATIONS_SKIP=1 ./vendor/drevops/vortex-tooling/src/provision"
          ./vendor/drevops/vortex-tooling/src/export-db db.sql
          docker compose cp -L cli:/app/.data/db.sql .data/db.sql
        timeout-minutes: 30
        env:
          STRATEGY_JOB_TOTAL: ${{ strategy.job-total }}
          STRATEGY_JOB_INDEX: ${{ strategy.job-index }}

      # Save the clean DB dump to cache from the primary parallel runner only,
      # and only when a fresh dump was downloaded this run (db_hash changed).
      - name: Save DB cache
        uses: actions/cache/save@__HASH__ # __VERSION__
        if: ${{ (matrix.instance == 0 || strategy.job-total == 1) && env.db_hash != hashFiles('.data') }}
        with:
          path: .data
          key: __VERSION__${{ hashFiles('db_cache_branch') }}-${{ hashFiles('db_cache_fallback_yes') }}-${{ hashFiles('db_cache_timestamp') }}

      - name: Provision site
        run: |
          if [ -f .data/db.sql ]; then
            docker compose exec cli mkdir -p .data
            docker compose cp -L .data/db.sql cli:/app/.data/db.sql
          fi
          docker compose exec $(env | cut -f1 -d= | sed 's/^/-e /') -T cli ./vendor/drevops/vortex-tooling/src/provision
        timeout-minutes: 30

      - name: Test with Jest
        if: ${{ matrix.instance == 0 || strategy.job-total == 1 }}
        run: docker compose exec -T cli bash -c "yarn test"
        continue-on-error: ${{ vars.VORTEX_CI_JEST_IGNORE_FAILURE == '1' }}

      - name: Test with PHPUnit
        if: ${{ matrix.instance == 0 || strategy.job-total == 1 }}
        run: docker compose exec -T cli vendor/bin/phpunit
        continue-on-error: ${{ vars.VORTEX_CI_PHPUNIT_IGNORE_FAILURE == '1' }}

      - name: Process PHPUnit logs and coverage
        if: ${{ matrix.instance == 0 || strategy.job-total == 1 }}
        run: |
          mkdir -p ".logs"
          if docker compose ps --services --filter "status=running" | grep -q cli && docker compose exec cli test -d /app/.logs; then
             docker compose cp cli:/app/.logs/. ".logs/"
          fi

      - name: Extract code coverage
        if: ${{ matrix.instance == 0 || strategy.job-total == 1 }}
        run: |
          RATE=$(grep -om1 'line-rate="[0-9.]*"' .logs/coverage/phpunit/cobertura.xml | tr -cd '0-9.')
          PERCENT=$(awk "BEGIN {printf \"%.2f\", $RATE*100}")
          echo "Coverage: $PERCENT% (threshold: $VORTEX_CI_CODE_COVERAGE_THRESHOLD%)" | tee -a "$GITHUB_STEP_SUMMARY"
          {
            echo "COVERAGE_PERCENT=${PERCENT}"
            echo "COVERAGE_SUMMARY<<EOF"
            awk '/^ *Summary:/{f=1;next} f && /^$/{exit} f' .logs/coverage/phpunit/coverage.txt
            echo "EOF"
            echo "COVERAGE_DETAILS<<EOF"
            awk 'BEGIN{s=0} /^ *Summary:/{s=1} s==1 && /^$/{s=2;next} s==2' .logs/coverage/phpunit/coverage.txt
            echo "EOF"
          } >> "$GITHUB_ENV"
        env:
          VORTEX_CI_CODE_COVERAGE_THRESHOLD: ${{ vars.VORTEX_CI_CODE_COVERAGE_THRESHOLD || '90' }}

      - name: Post coverage summary as PR comment
        if: ${{ github.event_name == 'pull_request' && (matrix.instance == 0 || strategy.job-total == 1) && vars.VORTEX_CI_CODE_COVERAGE_PR_COMMENT_SKIP != '1' }}
        uses: marocchino/sticky-pull-request-comment@__HASH__ # __VERSION__
        with:
          header: coverage-gha
          message: |
            **Code coverage** (threshold: ${{ vars.VORTEX_CI_CODE_COVERAGE_THRESHOLD || '90' }}%)
            ```
            ${{ env.COVERAGE_SUMMARY }}
            ```
            <details>
            <summary>Per-class coverage</summary>

            ```
            ${{ env.COVERAGE_DETAILS }}
            ```
            </details>
          hide_and_recreate: true

      - name: Check code coverage threshold
        if: ${{ matrix.instance == 0 || strategy.job-total == 1 }}
        run: |
          if [ "${COVERAGE_PERCENT//.}" -lt "$((VORTEX_CI_CODE_COVERAGE_THRESHOLD*100))" ]; then
            echo "FAIL: coverage ${COVERAGE_PERCENT}% is below threshold ${VORTEX_CI_CODE_COVERAGE_THRESHOLD}%"
            exit 1
          fi
        env:
          VORTEX_CI_CODE_COVERAGE_THRESHOLD: ${{ vars.VORTEX_CI_CODE_COVERAGE_THRESHOLD || '90' }}

      - name: Test with Behat
        run: |
          # shellcheck disable=SC2170
          if [ "${STRATEGY_JOB_TOTAL}" -gt 1 ]; then export VORTEX_CI_BEHAT_PROFILE="${VORTEX_CI_BEHAT_PROFILE:-p${STRATEGY_JOB_INDEX}}"; fi
          echo "Running with ${VORTEX_CI_BEHAT_PROFILE:-default} profile"
          docker compose exec -T cli php -d memory_limit=-1 vendor/bin/behat --colors --strict --profile="${VORTEX_CI_BEHAT_PROFILE:-default}" || \
            docker compose exec -T cli php -d memory_limit=-1 vendor/bin/behat --colors --strict --rerun --profile="${VORTEX_CI_BEHAT_PROFILE:-default}"
        env:
          VORTEX_CI_BEHAT_PROFILE: ${{ vars.VORTEX_CI_BEHAT_PROFILE }}
          STRATEGY_JOB_TOTAL: ${{ strategy.job-total }}
          STRATEGY_JOB_INDEX: ${{ strategy.job-index }}
        continue-on-error: ${{ vars.VORTEX_CI_BEHAT_IGNORE_FAILURE == '1' }}
        timeout-minutes: 30

      - name: Process test logs and artifacts
        if: always()
        run: |
          mkdir -p ".logs"
          if docker compose ps --services --filter "status=running" | grep -q cli && docker compose exec cli test -d /app/.logs; then
             docker compose cp cli:/app/.logs/. ".logs/"
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@__HASH__ # __VERSION__
        if: always()
        with:
          name: test-artifacts-${{ matrix.instance }}
          path: .logs
          include-hidden-files: true
          if-no-files-found: error

      - name: Publish test results to GitHub Checks
        if: ${{ !cancelled() && vars.VORTEX_CI_TEST_RESULTS_SKIP != '1' }}
        uses: EnricoMi/publish-unit-test-result-action@__HASH__ # __VERSION__
        with:
          check_name: Test results (${{ matrix.instance }})
          comment_mode: "off"
          test_file_prefix: "-/app/"
          files: |
            .logs/test_results/**/*.xml

      - name: Setup tmate session
        if: ${{ !cancelled() && github.event.inputs.enable_terminal }}
        uses: mxschmitt/action-tmate@__HASH__ # __VERSION__
        timeout-minutes: 120 # Cancel the action after 120 minutes, regardless of whether a connection has been established.
        with:
          detached: true

  # Build the deployable in parallel with the lint and test jobs. For artifact
  # deployments, it exports the built codebase for the deploy job; for
  # image-based hosting, a successful build validates that the production images
  # are deployable.
  build:
    runs-on: ubuntu-latest
    if: ${{ !inputs.deploy_target && !startsWith(github.head_ref || github.ref_name, 'deps/') && (github.event_name == 'push' || !startsWith(github.head_ref, 'project/')) }}

    container:
      # https://hub.docker.com/r/drevops/ci-runner
      image: drevops/ci-runner:__VERSION__
      env:
        PACKAGE_TOKEN: ${{ secrets.PACKAGE_TOKEN }}
        VORTEX_CONTAINER_REGISTRY_USER: ${{ secrets.VORTEX_CONTAINER_REGISTRY_USER }}
        VORTEX_CONTAINER_REGISTRY_PASS: ${{ secrets.VORTEX_CONTAINER_REGISTRY_PASS }}
        TZ: ${{ vars.TZ || 'UTC' }}
        TERM: xterm-256color
        # Disable strict host key checking for SSH connections.
        VORTEX_SSH_DISABLE_STRICT_HOST_KEY_CHECKING: "1"
        VORTEX_SSH_REMOVE_ALL_KEYS: "1"
        VORTEX_DEBUG: ${{ vars.VORTEX_DEBUG }}

    steps:
      - name: Preserve $HOME set in the container
        run: echo HOME=/root >> "$GITHUB_ENV" # https://github.com/actions/runner/issues/863

      - name: Check out code
        uses: actions/checkout@__HASH__ # __VERSION__
        with:
          persist-credentials: false

      - name: Fix Git ownership permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Process the codebase to run in CI
        run: find . -name "docker-compose.yml" -print0 | xargs -0 -I {} sh -c "sed -i -e '/###/d' {} && sed -i -e 's/##//' {}"

      - name: Load environment variables from .env
        run: t=$(mktemp) && export -p >"${t}" && set -a && . ./.env && set +a && . "${t}" && env >> "$GITHUB_ENV"

      - name: Install Vortex tooling
        run: ./scripts/vortex-tooling.sh

      - name: Login to container registry
        run: ./vendor/drevops/vortex-tooling/src/login-container-registry

      - name: Build stack
        run: docker compose up --detach && docker builder prune --all --force

  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: ${{ !cancelled() && (inputs.deploy_target || (success() && !startsWith(github.head_ref || github.ref_name, 'deps/') && (github.event_name == 'push' || !startsWith(github.head_ref, 'project/')))) }}

    container:
      # https://hub.docker.com/r/drevops/ci-runner
      image: drevops/ci-runner:__VERSION__
      env:
        TZ: ${{ vars.TZ || 'UTC' }}
        TERM: xterm-256color
        VORTEX_SSH_DISABLE_STRICT_HOST_KEY_CHECKING: "1"
        VORTEX_DEBUG: ${{ vars.VORTEX_DEBUG }}

    steps:
      - name: Preserve $HOME set in the container
        run: echo HOME=/root >> "$GITHUB_ENV" # https://github.com/actions/runner/issues/863

      - name: Resolve deploy target
        if: ${{ inputs.deploy_target }}
        env:
          DEPLOY_TARGET: ${{ inputs.deploy_target }}
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "DEPLOY_BRANCH=${DEPLOY_TARGET}"
            if echo "${DEPLOY_TARGET}" | grep -iq '^pr-'; then
              echo "DEPLOY_PR_NUMBER=${DEPLOY_TARGET#*-}"
              echo "DEPLOY_PR_HEAD_SHA=$(gh pr view "${DEPLOY_TARGET#*-}" --repo "${{ github.repository }}" --json headRefOid --jq '.headRefOid')"
              echo "DEPLOY_BRANCH=$(gh pr view "${DEPLOY_TARGET#*-}" --repo "${{ github.repository }}" --json headRefName --jq '.headRefName')"
            fi
          } >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@__HASH__ # __VERSION__
        with:
          # Fetch all history for git repository.
          fetch-depth: 0
          # Do not persist credentials after checkout
          # to allow using the custom credentials to push to a remote repo.
          persist-credentials: false
          ref: ${{ env.DEPLOY_BRANCH || github.head_ref || github.ref_name }}

      - name: Fix Git ownership permissions
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Load environment variables from .env
        run: t=$(mktemp) && export -p >"${t}" && set -a && . ./.env && set +a && . "${t}" && env >> "$GITHUB_ENV"

      # Artifact deployments do not work for manual deploys as the build job is skipped.
      - name: Download exported codebase as an artifact
        uses: actions/download-artifact@__HASH__ # __VERSION__
        if: ${{ !inputs.deploy_target && contains(env.VORTEX_DEPLOY_TYPES, 'artifact') }}
        with:
          name: code-artifact
          path: "/tmp/artifacts"

      - name: Unpack downloaded exported codebase
        if: ${{ !inputs.deploy_target && contains(env.VORTEX_DEPLOY_TYPES, 'artifact') }}
        run: |
          mkdir -p /tmp/workspace
          tar -xpf /tmp/artifacts/code.tar -C /tmp/workspace

      - name: Add SSH private key to the runner
        if: ${{ env.VORTEX_DEPLOY_SSH_PRIVATE_KEY != '' }}
        uses: shimataro/ssh-key-action@__HASH__ # __VERSION__
        with:
          key: ${{ secrets.VORTEX_DEPLOY_SSH_PRIVATE_KEY }}
          known_hosts: unnecessary
        env:
          VORTEX_DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.VORTEX_DEPLOY_SSH_PRIVATE_KEY }}

      - name: Install Vortex tooling
        run: ./scripts/vortex-tooling.sh

      - name: Deploy
        run: ./vendor/drevops/vortex-tooling/src/deploy
        env:
          VORTEX_DEPLOY_MODE: ${{ startsWith(github.ref, 'refs/tags/') && 'tag' || 'branch' }}
          VORTEX_DEPLOY_BRANCH: ${{ env.DEPLOY_BRANCH || github.head_ref || github.ref_name }}
          VORTEX_DEPLOY_PR: ${{ env.DEPLOY_PR_NUMBER || github.event.number }}
          VORTEX_DEPLOY_PR_HEAD: ${{ env.DEPLOY_PR_HEAD_SHA || github.event.pull_request.head.sha }}
          VORTEX_DEPLOY_PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          VORTEX_DEPLOY_ARTIFACT_SRC: /tmp/workspace/code
          VORTEX_DEPLOY_ARTIFACT_ROOT: ${{ github.workspace }}
          VORTEX_DEPLOY_ARTIFACT_GIT_REMOTE: ${{ vars.VORTEX_DEPLOY_ARTIFACT_GIT_REMOTE }}
          VORTEX_DEPLOY_ARTIFACT_GIT_USER_EMAIL: ${{ vars.VORTEX_DEPLOY_ARTIFACT_GIT_USER_EMAIL }}
          VORTEX_DEPLOY_ARTIFACT_GIT_USER_NAME: ${{ vars.VORTEX_DEPLOY_ARTIFACT_GIT_USER_NAME }}
          VORTEX_DEPLOY_WEBHOOK_URL: ${{ vars.VORTEX_DEPLOY_WEBHOOK_URL }}
          VORTEX_DEPLOY_SKIP: ${{ vars.VORTEX_DEPLOY_SKIP }}
          VORTEX_DEPLOY_ALLOW_SKIP: ${{ vars.VORTEX_DEPLOY_ALLOW_SKIP }}
          VORTEX_DEPLOY_SKIP_PRS: ${{ vars.VORTEX_DEPLOY_SKIP_PRS }}
          VORTEX_DEPLOY_SKIP_BRANCHES: ${{ vars.VORTEX_DEPLOY_SKIP_BRANCHES }}
          VORTEX_DEPLOY_ALLOW_LABEL: ${{ vars.VORTEX_DEPLOY_ALLOW_LABEL }}
          VORTEX_DEPLOY_ACTION: ${{ inputs.override_db && 'deploy_override_db' || '' }}
        timeout-minutes: 30
