$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Button
status: stable
description: A call-to-action rendered as a link when a URL is provided, or as a button element otherwise.
props:
  type: object
  required:
    - label
  properties:
    label:
      type: string
      title: Label
      description: Visible text rendered inside the button when no content slot is provided.
    url:
      type: string
      title: URL
      description: Optional destination. When set, an anchor is rendered; otherwise a button element.
    modifier:
      type: string
      title: Modifier
      description: Optional name appended as a button--MODIFIER class for variant styling.
slots:
  content:
    title: Content
    description: Optional markup rendered inside the button, overriding the label.
