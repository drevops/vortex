# The smallest useful configuration: two fields, no handlers.
title: 'Minimal'

panels:
  - id: main
    title: 'Main'
    fields:
      - id: name
        label: 'Your name'
        type: text
        required: true
      - id: colour
        label: 'Favourite colour'
        type: select
        default: blue
        options:
          - { value: red, label: 'Red' }
          - { value: green, label: 'Green' }
          - { value: blue, label: 'Blue' }
