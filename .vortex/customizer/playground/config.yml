# Playground configuration for the customizer.
#
# A small "package scaffolder" that exercises most customizer features:
# every widget type, conditional visibility (when), derived values with
# str2name transforms, and a custom auto-discovered handler.
#
# Try it:
#   composer install
#   php playground/run.php                       # interactive TUI
#   php playground/run.php --prompts='{"name":"My Widget"}'   # non-interactive
#   php playground/run.php --schema              # print the JSON schema
title: 'Package scaffolder'

panels:
  - id: general
    title: 'General'
    description: 'Naming and identity.'
    fields:
      # A required free-text field. The custom Name handler trims and validates.
      - id: name
        label: 'Package name'
        description: 'A human-readable name, e.g. "My Widget".'
        type: text
        required: true

      # Derived: machine name of the package name (str2name "machine").
      - id: machine_name
        label: 'Machine name'
        description: 'Derived from the package name.'
        type: text
        derive: { template: '{{name}}', transform: machine }

      # A plain default that other fields derive from.
      - id: vendor
        label: 'Vendor'
        type: text
        default: acme

      # Derived through a chain: "{{vendor}}/{{machine_name}}", lowercased.
      - id: package
        label: 'Composer package'
        description: 'Derived from vendor and machine name.'
        type: text
        derive: { template: '{{vendor}}/{{machine_name}}', transform: lower }

      # Derived PHP namespace (str2name "pascal").
      - id: namespace
        label: 'PHP namespace'
        type: text
        derive: { template: '{{name}}', transform: pascal }

  - id: build
    title: 'Build & features'
    description: 'What the package ships with.'
    fields:
      # A single-choice list.
      - id: type
        label: 'Package type'
        type: select
        default: library
        options:
          - { value: library, label: 'Library' }
          - { value: application, label: 'Application' }
          - { value: cli, label: 'CLI tool' }

      # A multi-select list.
      - id: features
        label: 'Features'
        description: 'Space to toggle, type to filter.'
        type: multiselect
        options:
          - { value: tests, label: 'Tests' }
          - { value: ci, label: 'CI' }
          - { value: docker, label: 'Docker' }
          - { value: docs, label: 'Docs' }

      # Conditional: only shown when "docker" is among the selected features.
      - id: docker_image
        label: 'Docker base image'
        type: text
        default: 'php:8.4-cli'
        when: { field: features, contains: docker }

      # An autocomplete with free-text fallback.
      - id: php_version
        label: 'PHP version'
        type: suggest
        default: '8.4'
        options:
          - { value: '8.1' }
          - { value: '8.2' }
          - { value: '8.3' }
          - { value: '8.4' }

      # A yes/no toggle.
      - id: private
        label: 'Private package?'
        type: confirm
        default: false
