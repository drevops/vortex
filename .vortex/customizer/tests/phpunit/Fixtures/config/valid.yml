title: Demo
subject: Acme
panels:
  - id: general
    title: 'General information'
    description: 'Names and domain'
    fields:
      - id: name
        label: 'Site name'
        description: 'Human-readable name.'
        type: text
        default: Acme
        required: true
      - id: machine_name
        label: 'Machine name'
        type: text
        default: acme
        machine: true
  - id: drupal
    title: Drupal
    description: 'Drupal settings'
    fields:
      - id: profile
        label: Profile
        type: select
        default: standard
        options:
          - value: standard
            label: Standard
            description: 'Standard profile.'
          - value: minimal
            label: Minimal
    panels:
      - id: advanced
        title: Advanced
        description: 'Advanced Drupal'
        fields:
          - id: theme_debug
            label: 'Theme debug'
            type: confirm
            default: false
