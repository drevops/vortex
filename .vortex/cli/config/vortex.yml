title: 'Vortex'
subject: 'your project'

# Field-less processors that bookend field processing: carry the ".env" first,
# run internal cleanup and global content transforms last. Fields in between
# process in reverse declaration order (specific replacements before generic).
processors:
  - id: dotenv
    weight: -1000
  - id: internal
    weight: 1000

panels:
  - id: general
    title: 'General information'
    description: 'Project name, organization and public domain.'
    fields:
      - id: name
        weight: 380
        label: 'Site name'
        description: 'We will use this name in the project and documentation.'
        required: true
      - id: machine_name
        weight: 360
        label: 'Site machine name'
        description: 'We will use this name for the project directory and in the code.'
        required: true
        derive:
          template: '{{name}}'
          transform: machine
      - id: org
        weight: 370
        label: 'Organization name'
        description: 'We will use this name in the project and documentation.'
        required: true
        derive:
          template: '{{name}} Org'
      - id: org_machine_name
        weight: 350
        label: 'Organization machine name'
        description: 'We will use this name in the code.'
        required: true
        derive:
          template: '{{org}}'
          transform: machine
      - id: domain
        weight: 280
        label: 'Public domain'
        description: 'Domain name without protocol and trailing slash.'
        required: true
        derive:
          template: '{{machine_name}}.com'
          transform: host

  - id: drupal
    title: 'Drupal'
    description: 'Install profile, modules, theme and front-end build.'
    fields:
      - id: starter
        weight: 250
        label: 'How would you like your site to be created on the first run?'
        description: 'Applies only on the first run of the installer.'
        type: select
        default: load_demodb
        options:
          - value: install_profile_core
            label: 'Drupal, installed from profile'
          - value: install_profile_drupalcms
            label: 'Drupal CMS, installed from profile'
          - value: load_demodb
            label: 'Drupal, loaded from the demo database'
      - id: profile
        weight: 270
        label: 'Profile'
        description: 'The Drupal installation profile the site is built on.'
        type: select
        default: standard
        required: true
        options:
          - value: standard
            label: 'Standard'
          - value: minimal
            label: 'Minimal'
          - value: demo_umami
            label: 'Demo Umami'
          - value: custom
            label: 'Custom (next prompt)'
      - id: profile_custom
        weight: 260
        label: 'Custom profile machine name'
        description: 'The machine name of your custom profile.'
        required: true
        when:
          field: profile
          eq: custom
      - id: modules
        weight: 240
        label: 'Modules'
        description: 'Optional contributed modules to include.'
        type: multiselect
        default:
          - admin_toolbar
          - coffee
          - config_split
          - config_update
          - devel
          - drupal_helpers
          - environment_indicator
          - generated_content
          - pathauto
          - redirect
          - reroute_email
          - robotstxt
          - sdc_devel
          - seckit
          - shield
          - stage_file_proxy
          - testmode
          - xmlsitemap
        options:
          - value: admin_toolbar
            label: 'Admin toolbar'
          - value: coffee
            label: 'Coffee'
          - value: config_split
            label: 'Config split'
          - value: config_update
            label: 'Config update'
          - value: devel
            label: 'Devel'
          - value: drupal_helpers
            label: 'Drupal helpers'
          - value: environment_indicator
            label: 'Environment indicator'
          - value: generated_content
            label: 'Generated content'
          - value: pathauto
            label: 'Pathauto'
          - value: redirect
            label: 'Redirect'
          - value: reroute_email
            label: 'Reroute email'
          - value: robotstxt
            label: 'Robots.txt'
          - value: sdc_devel
            label: 'SDC Devel'
          - value: seckit
            label: 'Seckit'
          - value: shield
            label: 'Shield'
          - value: stage_file_proxy
            label: 'Stage file proxy'
          - value: testmode
            label: 'Testmode'
          - value: xmlsitemap
            label: 'XML Sitemap'
      - id: module_prefix
        weight: 310
        label: 'Custom modules prefix'
        description: 'We will use this name in custom modules.'
        required: true
        derive:
          template: '{{machine_name}}'
          transform: initials
      - id: custom_modules
        weight: 300
        label: 'Custom modules'
        description: 'Which scaffolded custom modules to keep.'
        type: multiselect
        default:
          - base
          - search
          - demo
        options:
          - value: base
            label: 'Base - starter module with utilities and test scaffolding'
          - value: search
            label: 'Search - custom Solr search integration'
          - value: demo
            label: 'Demo - counter block and example tests to demonstrate tooling'
      - id: theme
        weight: 340
        label: 'Theme'
        description: 'The base theme for the site front-end.'
        type: select
        default: custom
        required: true
        options:
          - value: olivero
            label: 'Olivero'
          - value: claro
            label: 'Claro'
          - value: stark
            label: 'Stark'
          - value: custom
            label: 'Custom (next prompt)'
      - id: theme_custom
        weight: 330
        label: 'Custom theme machine name'
        description: 'We will use this name as a custom theme name.'
        required: true
        when:
          field: theme
          eq: custom
        derive:
          template: '{{machine_name}}'
          transform: machine
      - id: frontend_build
        weight: 320
        label: 'Build front-end assets in the container?'
        description: 'Disable to build theme assets on the host or as part of deployment.'
        type: confirm
        default: true
        when:
          field: theme
          eq: custom

  - id: code_repository
    title: 'Code repository'
    description: 'Where the code lives and how releases are versioned.'
    fields:
      - id: code_provider
        weight: 230
        label: 'Repository provider'
        description: 'Vortex offers full automation with GitHub; support for other providers is limited.'
        type: select
        default: github
        options:
          - value: github
            label: 'GitHub'
          - value: other
            label: 'Other'
      - id: version_scheme
        weight: 220
        label: 'Release versioning scheme'
        description: 'CalVer (year.month.patch) or SemVer (major.minor.patch).'
        type: select
        default: calver
        options:
          - value: calver
            label: 'Calendar Versioning (CalVer)'
          - value: semver
            label: 'Semantic Versioning (SemVer)'
          - value: other
            label: 'Other'

  - id: environment
    title: 'Environment'
    description: 'Timezone, Docker services and developer tooling.'
    fields:
      - id: timezone
        weight: 210
        label: 'Timezone'
        description: 'Start typing to select the timezone for your project.'
        type: suggest
        default: UTC
        options:
          - value: UTC
          - value: 'Africa/Johannesburg'
          - value: 'America/Chicago'
          - value: 'America/Los_Angeles'
          - value: 'America/New_York'
          - value: 'America/Sao_Paulo'
          - value: 'America/Toronto'
          - value: 'Asia/Dubai'
          - value: 'Asia/Hong_Kong'
          - value: 'Asia/Kolkata'
          - value: 'Asia/Singapore'
          - value: 'Asia/Tokyo'
          - value: 'Australia/Melbourne'
          - value: 'Australia/Sydney'
          - value: 'Europe/Amsterdam'
          - value: 'Europe/Berlin'
          - value: 'Europe/London'
          - value: 'Europe/Madrid'
          - value: 'Europe/Paris'
          - value: 'Pacific/Auckland'
      - id: services
        weight: 200
        label: 'Services'
        description: 'Optional Docker services to include.'
        type: multiselect
        default:
          - clamav
          - redis
          - solr
        options:
          - value: clamav
            label: 'ClamAV'
          - value: solr
            label: 'Solr'
          - value: redis
            label: 'Redis'
      - id: tools
        weight: 190
        label: 'Development tools'
        description: 'Linting and testing tools to keep.'
        type: multiselect
        default:
          - behat
          - eslint
          - jest
          - phpcs
          - phpstan
          - phpunit
          - rector
          - stylelint
        options:
          - value: phpcs
            label: 'PHP CodeSniffer'
          - value: phpstan
            label: 'PHPStan'
          - value: rector
            label: 'Rector'
          - value: eslint
            label: 'ESLint'
          - value: stylelint
            label: 'Stylelint'
          - value: phpunit
            label: 'PHPUnit'
          - value: behat
            label: 'Behat'
          - value: jest
            label: 'Jest'

  - id: hosting
    title: 'Hosting'
    description: 'Target hosting provider and project name.'
    fields:
      - id: hosting_provider
        weight: 180
        label: 'Hosting provider'
        description: 'The hosting provider for the project.'
        type: select
        default: none
        required: true
        options:
          - value: acquia
            label: 'Acquia Cloud'
          - value: lagoon
            label: 'Lagoon'
          - value: other
            label: 'Other'
          - value: none
            label: 'None'
      - id: hosting_project_name
        weight: 290
        label: 'Hosting project name'
        description: 'Name as found in the hosting configuration; usually the site machine name.'
        required: true
        when:
          field: hosting_provider
          in:
            - lagoon
            - acquia
        derive:
          template: '{{machine_name}}'
      - id: webroot
        weight: 10
        label: 'Custom web root directory'
        description: 'The directory where the web server serves the site.'
        default: web
        required: true

  - id: deployment
    title: 'Deployment'
    description: 'How code is shipped to the hosting environment.'
    fields:
      - id: deploy_types
        weight: 170
        label: 'Deployment types'
        description: 'One or more deployment mechanisms.'
        type: multiselect
        default:
          - webhook
        options:
          - value: artifact
            label: 'Code artifact'
          - value: lagoon
            label: 'Lagoon webhook'
          - value: webhook
            label: 'Custom webhook'

  - id: workflow
    title: 'Workflow'
    description: 'Provisioning method and database source.'
    fields:
      - id: provision_type
        weight: 150
        label: 'Provision type'
        description: 'How the site is provisioned: from a database dump or installed from a profile.'
        type: select
        default: database
        options:
          - value: database
            label: 'Import from database dump'
          - value: profile
            label: 'Install from profile'
      - id: database_fetch_source
        weight: 140
        label: 'Database source'
        description: 'Where the database dump is fetched from.'
        type: select
        default: url
        when:
          field: provision_type
          eq: database
        options:
          - value: url
            label: 'URL download'
          - value: ftp
            label: 'FTP download'
          - value: acquia
            label: 'Acquia backup'
          - value: lagoon
            label: 'Lagoon environment'
          - value: container_registry
            label: 'Container registry'
          - value: s3
            label: 'S3 bucket'
          - value: none
            label: 'None'
      - id: database_image
        weight: 130
        label: 'Database container image name and tag'
        description: 'Use the "latest" tag for the latest version.'
        when:
          field: database_fetch_source
          eq: container_registry
        derive:
          template: '{{org_machine_name}}/{{machine_name}}-data:latest'
          transform: lower
      - id: migration
        weight: 120
        label: 'Use a second database for migrations?'
        description: 'Adds a second database service for Drupal migrations.'
        type: confirm
        default: false
      - id: migration_fetch_source
        weight: 110
        label: 'Migration database source'
        description: 'Where the migration database dump is fetched from.'
        type: select
        default: url
        when:
          field: migration
          eq: true
        options:
          - value: url
            label: 'URL download'
          - value: ftp
            label: 'FTP download'
          - value: acquia
            label: 'Acquia backup'
          - value: lagoon
            label: 'Lagoon environment'
          - value: container_registry
            label: 'Container registry'
          - value: s3
            label: 'S3 bucket'
      - id: migration_image
        weight: 100
        label: 'Migration database container image name and tag'
        description: 'Use the "latest" tag for the latest version.'
        when:
          field: migration_fetch_source
          eq: container_registry
        derive:
          template: '{{org_machine_name}}/{{machine_name}}-data-migration:latest'
          transform: lower

  - id: notifications
    title: 'Notifications'
    description: 'Where build and deployment notifications are sent.'
    fields:
      - id: notification_channels
        weight: 160
        label: 'Notification channels'
        description: 'One or more notification channels.'
        type: multiselect
        default:
          - email
        options:
          - value: email
            label: 'Email'
          - value: github
            label: 'GitHub'
          - value: jira
            label: 'JIRA'
          - value: newrelic
            label: 'New Relic'
          - value: slack
            label: 'Slack'
          - value: webhook
            label: 'Webhook'

  - id: continuous_integration
    title: 'Continuous Integration'
    description: 'CI provider and visual regression testing.'
    fields:
      - id: ci_provider
        weight: 90
        label: 'Continuous Integration provider'
        description: 'The CI provider for the project.'
        type: select
        default: gha
        options:
          - value: gha
            label: 'GitHub Actions'
          - value: circleci
            label: 'CircleCI'
          - value: none
            label: 'None'
      - id: visual_regression
        weight: 80
        label: 'Visual regression testing with Diffy?'
        description: 'Requires a Diffy account.'
        type: confirm
        default: false

  - id: automations
    title: 'Automations'
    description: 'Dependency updates, coverage and PR automation.'
    fields:
      - id: dependency_updates_provider
        weight: 70
        label: 'Dependency updates provider'
        description: 'The dependency updates provider.'
        type: select
        default: renovatebot_app
        options:
          - value: renovatebot_app
            label: 'Renovate GitHub app'
          - value: renovatebot_ci
            label: 'Renovate self-hosted in CI'
          - value: none
            label: 'None'
      - id: code_coverage_provider
        weight: 60
        label: 'Code coverage provider'
        description: 'The code coverage provider.'
        type: select
        default: none
        options:
          - value: codecov
            label: 'Codecov'
          - value: none
            label: 'None'
      - id: assign_author_pr
        weight: 50
        label: 'Auto-assign the author to their PR?'
        description: 'Helps to keep the PRs organized.'
        type: confirm
        default: true
      - id: label_merge_conflicts_pr
        weight: 40
        label: 'Auto-add a CONFLICT label to a PR when conflicts occur?'
        description: 'Helps to quickly identify PRs that need attention.'
        type: confirm
        default: true

  - id: documentation
    title: 'Documentation'
    description: 'Whether project documentation is kept.'
    fields:
      - id: preserve_docs_project
        weight: 30
        label: 'Preserve project documentation?'
        description: 'Helps to maintain the project documentation within the repository.'
        type: confirm
        default: true

  - id: ai
    title: 'AI'
    description: 'Whether AI agent instructions are included.'
    fields:
      - id: ai_code_instructions
        weight: 20
        label: 'Provide AI agent instructions?'
        description: 'Provides AI coding agents with better context about the project.'
        type: confirm
        default: true
