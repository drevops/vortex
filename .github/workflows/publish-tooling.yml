# This action is used for Vortex maintenance. It will not be used in the scaffolded project.
#
# Publishes the contents of '.vortex/tooling/' from this monorepo to the
# 'drevops/vortex-tooling' repository on every push, mirroring the source
# branch name. An empty commit is created when there are no file changes so
# every source commit is reflected at the target. The published commit
# subject matches the source commit subject; the body records provenance.

name: Vortex - Publish tooling

on:
  push:
    branches:
      - '**'

concurrency:
  group: publish-tooling-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tooling:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # v2
        with:
          php-version: '8.4'

      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${VORTEX_TOOLING_DEPLOY_KEY}" >~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >>~/.ssh/known_hosts 2>/dev/null
        env:
          VORTEX_TOOLING_DEPLOY_KEY: ${{ secrets.VORTEX_TOOLING_DEPLOY_KEY }}

      - name: Publish '.vortex/tooling/' to 'drevops/vortex-tooling'
        run: |
          php <<'PHP'
          <?php
          // ---------------------------------------------------------------------
          // Publish the contents of '.vortex/tooling/' to a same-named branch on
          // 'drevops/vortex-tooling'. Always produces a commit, even when there
          // are no file changes, so the target history mirrors the source.
          // ---------------------------------------------------------------------

          function run(string $cmd, ?string $cwd = NULL, bool $allow_fail = FALSE): int {
            $prev = NULL;
            if ($cwd !== NULL) {
              $prev = getcwd();
              chdir($cwd);
            }
            echo "+ {$cmd}\n";
            passthru($cmd, $rc);
            if ($prev !== NULL) {
              chdir($prev);
            }
            if ($rc !== 0 && !$allow_fail) {
              fwrite(STDERR, "Command failed (exit {$rc}): {$cmd}\n");
              exit($rc);
            }
            return $rc;
          }

          function capture(string $cmd, ?string $cwd = NULL): string {
            $prev = NULL;
            if ($cwd !== NULL) {
              $prev = getcwd();
              chdir($cwd);
            }
            $out = shell_exec($cmd);
            if ($prev !== NULL) {
              chdir($prev);
            }
            return trim((string) $out);
          }

          $source     = getenv('GITHUB_WORKSPACE') . '/.vortex/tooling';
          $branch     = (string) getenv('GITHUB_REF_NAME');
          $sha        = (string) getenv('GITHUB_SHA');
          $repo_src   = (string) getenv('GITHUB_REPOSITORY');
          $repo_dst   = 'git@github.com:drevops/vortex-tooling.git';
          $work_dir   = sys_get_temp_dir() . '/vortex-tooling-publish';

          // Subject of the latest source commit, used verbatim as the target
          // commit subject. Body carries provenance.
          $subject = capture(sprintf(
            'git log -1 --pretty=%%s %s',
            escapeshellarg($sha)
          ), getenv('GITHUB_WORKSPACE'));

          if ($subject === '') {
            $subject = sprintf('Published from %s@%s', $repo_src, substr($sha, 0, 7));
          }

          $body = sprintf("Source: %s@%s\nBranch: %s", $repo_src, $sha, $branch);

          // Prepare the target working tree.
          run('rm -rf ' . escapeshellarg($work_dir));
          mkdir($work_dir, 0755, TRUE);

          // Try to clone the matching branch directly; if it does not exist,
          // clone the default branch and create the branch as an orphan so we
          // start from a clean history for new source branches.
          $clone_branch_rc = run(sprintf(
            'git clone --quiet --branch %s --single-branch %s %s',
            escapeshellarg($branch),
            escapeshellarg($repo_dst),
            escapeshellarg($work_dir)
          ), NULL, TRUE);

          if ($clone_branch_rc !== 0) {
            echo "Branch '{$branch}' does not exist on target; creating it as an orphan.\n";
            run('rm -rf ' . escapeshellarg($work_dir));
            mkdir($work_dir, 0755, TRUE);
            run(sprintf(
              'git clone --quiet %s %s',
              escapeshellarg($repo_dst),
              escapeshellarg($work_dir)
            ));
            run(sprintf('git checkout --orphan %s', escapeshellarg($branch)), $work_dir);
            // Drop the staged tree inherited from the default branch.
            run('git rm -rf --quiet . 2>/dev/null', $work_dir, TRUE);
          }

          // Wipe the target working tree (preserve '.git').
          foreach (scandir($work_dir) as $entry) {
            if ($entry === '.' || $entry === '..' || $entry === '.git') {
              continue;
            }
            run(sprintf('rm -rf %s/%s', escapeshellarg($work_dir), escapeshellarg($entry)));
          }

          // Mirror source contents over. Exclude generated artefacts.
          run(sprintf(
            "rsync -a --exclude='/node_modules/' --exclude='/vendor/' %s/ %s/",
            escapeshellarg($source),
            escapeshellarg($work_dir)
          ));

          // Configure git identity for the publishing commit.
          run("git config user.name 'Vortex Publisher'", $work_dir);
          run("git config user.email 'noreply@drevops.com'", $work_dir);

          // Stage, commit (allow empty), and push.
          run('git add -A', $work_dir);
          $message = $subject . "\n\n" . $body;
          run(sprintf(
            'git commit --allow-empty -m %s',
            escapeshellarg($message)
          ), $work_dir);
          run(sprintf('git push --force origin %s', escapeshellarg($branch)), $work_dir);

          echo "Published '{$repo_src}@{$sha}' to drevops/vortex-tooling#{$branch}\n";
          PHP
