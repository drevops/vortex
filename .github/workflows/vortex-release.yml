# This action is used for Vortex maintenance. It will not be used in the scaffolded project.
name: Vortex - Release docs

on:
  push:
    tags:
      - '*'
    branches:
      - '**release-docs**'
      - '**release-installer**'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (leave empty for auto-discovery)'
        required: false
        type: string

concurrency:
  group: pages
  cancel-in-progress: true

jobs:

  vortex-release-installer:
    runs-on: ubuntu-latest

    permissions:
      contents: read # Checkout the repository; only builds and uploads the PHAR artifact.

    outputs:
      release-version: ${{ steps.version.outputs.value }}

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Cache Composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-${{ hashFiles('**/composer.lock') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3

      - name: Install dependencies
        run: composer install
        working-directory: .vortex/installer

      - name: Set release version
        id: version
        run: |
          if [ -n "${INPUTS_VERSION}" ]; then
            version="${INPUTS_VERSION}"
          else
            TAG=""
            SHA=""
            if [ "${REF_TYPE}" = "tag" ]; then TAG="${REF_NAME}"; fi
            if [ "${REF_TYPE}" = "branch" ]; then SHA="${REF_SHA}"; fi
            version="${TAG:-${SHA}}"
          fi
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"
        working-directory: .vortex/installer
        env:
          INPUTS_VERSION: ${{ inputs.version }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REF_SHA: ${{ github.sha }}

      - name: Build PHAR
        run: |
          sed -i "s/\"vortex-installer-version\": \"development\"/\"vortex-installer-version\": \"${RELEASE_VERSION}\"/g" box.json
          composer build
        working-directory: .vortex/installer

      - name: Test PHAR
        run: |
          ./build/installer.phar --version
          ./build/installer.phar --no-interaction --no-cleanup --destination=test || exit 1
        working-directory: .vortex/installer

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vortex-installer
          path: .vortex/installer/build/installer.phar
          if-no-files-found: error

  vortex-release-docs:
    needs: vortex-release-installer

    permissions:
      contents: read # Checkout the repository and build the documentation site.
      pages: write # Deploy the built site via 'actions/deploy-pages'.
      id-token: write # OIDC token required by 'actions/deploy-pages' to publish to GitHub Pages.

    environment:
      name: github-pages

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: docs

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set version
        run: |
          version="${NEEDS_VORTEX_RELEASE_INSTALLER_OUTPUTS_RELEASE_VERSION}"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release version: $version"
        env:
          NEEDS_VORTEX_RELEASE_INSTALLER_OUTPUTS_RELEASE_VERSION: ${{ needs.vortex-release-installer.outputs.release-version }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.17.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: 8.3

      - name: Download installer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: vortex-installer

      - name: Copy installer to docs
        run: |
          cp ../installer.phar ../.vortex/docs/static/install
          php ../.vortex/docs/static/install --version

      - name: Check docs up-to-date
        run: |
          yarn run update-variables
          git diff --quiet HEAD || { echo "Docs not up-to-date. Run 'cd .vortex && ahoy update-docs' and commit changes."; git diff; exit 1; }
        working-directory: .vortex/docs

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: .vortex/docs

      # Assemble the multi-version site for production: snapshot the released
      # docs as v1 (served at the bare '/docs') and pull the '2.x'
      # docs in as v2 (at '/docs/v2'). Mirrors the same step in
      # 'vortex-test-docs.yml' (development / Netlify).
      - name: Assemble versioned docs
        run: |
          yarn docusaurus docs:version 1.x
          git -C "${{ github.workspace }}" fetch origin 2.x --depth=1 || { echo "Failed to fetch the 2.x branch."; exit 1; }
          git -C "${{ github.workspace }}" rev-parse --verify origin/2.x || { echo "The 2.x branch does not exist."; exit 1; }
          rm -rf content
          git -C "${{ github.workspace }}" checkout origin/2.x -- .vortex/docs/content || { echo "Failed to check out content from 2.x."; exit 1; }
        working-directory: .vortex/docs

      - name: Build documentation site
        run: yarn run build
        working-directory: .vortex/docs

      - name: Generate video for installer (not used in the final artifact)
        run: |
          sudo apt-get update
          sudo apt install expect
          sudo curl -sSL https://github.com/asciinema/asciinema/releases/latest/download/asciinema-x86_64-unknown-linux-gnu -o /usr/local/bin/asciinema && sudo chmod +x /usr/local/bin/asciinema
          npm i -g sharp-cli
          yarn install --frozen-lockfile
          php .utils/update-videos.php installer
        working-directory: .vortex/docs

      - name: Upload documentation site
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: .vortex/docs/build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
